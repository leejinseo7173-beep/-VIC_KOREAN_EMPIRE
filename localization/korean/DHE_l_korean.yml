 # 2. 이벤트 텍스트
 dhe_event.1.t:0 "칭제건원(稱帝建元): 제국의 여명"
 dhe_event.1.d:0 "반만년 유구한 역사를 지닌 우리 배달겨레는 그동안 대륙의 거대한 그늘 아래서 인내하며 때를 기다려왔다. 이제 우리는 낡은 사대(事大)의 껍질을 과감히 깨부수고, 자주적인 황제국임을 만방에 선포한다.\n\n오늘부로 국호를 '대한(大韓)'이라 하고, 독자적인 연호를 제정하여 황제의 위엄을 드높일 것이다.\n\n이것은 단순한 국호의 변경이 아니다. 우리 민족의 운명을 스스로 개척하겠다는 결연한 의지의 표명이며, 동방의 등불이 다시 타오르고 있음을 알리는 신호탄이다!"
 dhe_event.1.a:0 "황제 폐하 만세! 만세! 만만세!"

 dhe_event.2.t:0 "천하통일(天下統一): 대동아의 진정한 주인"
 dhe_event.2.d:0 "북으로는 광활한 만주 벌판의 옛 고토를 수복하여 고구려와 발해의 기상을 되찾았고, 남으로는 현해탄을 건너 일본 열도와 대만까지 우리의 강역으로 복속시켰다.\n\n이것은 단순한 영토 확장이 아니다. 단군 이래 최대의 과업이자, 서구 열강의 침탈로부터 아시아를 지켜낼 새로운 질서가 우리 손에 의해 확립되었음을 알리는 역사적 순간이다.\n\n이제 아시아의 태양은 도쿄가 아닌 서울에서 떠오를 것이며, 황제의 칙령이 동방의 모든 바다와 땅을 다스리게 될 것이다. 우리가 곧 아시아의 질서이자 법이다!"
 dhe_event.2.a:0 "동방의 절대 패자(覇者)여, 영원하라!"

 dhe_event.3.t:0 "광무개혁(光武改革): 구본신참의 기치 아래"
 dhe_event.3.d:0 "제국을 선포했으나 내실이 없다면 그것은 모래 위에 지은 성(砂上樓閣)과 다를 바 없다. 서세동점(西勢東漸)의 거센 파도 속에서 살아남기 위해서는 뼈를 깎는 개혁이 필요하다.\n\n'옛것을 근본으로 삼고 새것을 참고한다'는 구본신참(舊本新參)의 원칙 아래, 우리는 산업, 군사, 교육, 행정, 사회 전반에 걸친 대대적인 개혁을 단행할 것이다.\n\n이제 낡은 인습을 타파하고 부국강병의 기틀을 마련하여, 세계 만국과 당당히 경쟁하는 근대 제국으로 거듭나야 한다."
 dhe_event.3.a:0 "개혁 없이는 미래도 없다! 전진하라!"

 dhe_event.4.t:0 "광무개혁 완수: 근대 제국의 완성"
 dhe_event.4.d:0 "피와 땀으로 얼룩진 고난의 시간이 지났다. 우리의 끊임없는 노력은 결코 헛되지 않았다.\n\n전국 방방곡곡에 철마가 달리고, 최신식 무기로 무장한 황군이 국경을 철통같이 지키며, 신식 학교에서 배운 깨어있는 백성들이 제국의 미래를 밝히고 있다.\n\n우리는 이제 그 누구도 무시할 수 없는 명실상부한 열강의 반열에 올랐다.\n\n오늘 우리는 전 세계에 선언한다. 대한제국은 영원할 것이며, 우리의 번영은 끝이 없을 것이다!"
 dhe_event.4.a:0 "제국의 영광은 영원하리라!"
 
 dhe_event.hangeul_complete.t:0 "한글의 보급"
 dhe_event.hangeul_complete.d:0 "체계적인 교육 덕분에 백성들이 글을 깨우치고 있습니다. 국력이 크게 신장될 것입니다."
 dhe_event.hangeul_complete.a:0 "훌륭하구나."

 # 3. 결단(Decision)
 dhe_proclaim_empire_decision:0 "칭제건원 선포"
 dhe_proclaim_empire_decision_desc:0 "서세동점의 혼란 속에서 우리 민족이 살아남을 길은 오직 스스로 강해지는 것뿐이다. 500년 묵은 사대의 예를 과감히 벗어던지고, 황제의 위엄을 갖추어 만방에 자주독립국임을 선포하라."
 dhe_proclaim_empire_decision_tooltip:0 "국가 태그가 [DHE]로 변경되고 제국의 반열에 오릅니다."

 dhe_great_korea_ambition:0 "황실의 원대한 야망"
 dhe_great_korea_ambition_desc:0 "한반도는 너무 좁다. 북으로는 잃어버린 고토를 수복하여 대륙으로 뻗어나가고, 남으로는 왜구의 본거지를 정벌하여 동아시아의 진정한 패자가 되어야 한다."
 dhe_great_korea_ambition_tooltip:0 "만주와 일본, 대만 전역에 대한 [concept_claim]을 획득합니다."

