 dhe_hangeul_edu_prepare_decision:0 "한글 교육 준비"
 dhe_hangeul_edu_prepare_decision_desc:0 "황제 폐하의 칙령 아래, 백성 모두가 글을 깨칠 수 있도록 국가 차원의 한글 교육 체계를 준비한다."
 dhe_hangeul_edu_prepare_decision_tooltip:0 "20년간 한글 교육 준비 정책을 시행합니다."
 dhe_hangeul_edu_preparing:0 "한글 교육 준비 중"
 dhe_hangeul_edu_complete_decision:0 "한글 교육 완수"
 dhe_hangeul_edu_complete_decision_desc:0 "한글 교육 체계가 전국에 정착되었습니다. 문자는 더 이상 지식인의 전유물이 아닙니다."
 dhe_hangeul_edu_complete_decision_tooltip:0 "한글 교육이 완전히 제도화되어 영구적인 효과를 얻습니다."
