 # 남방 정벌 (일본 및 대만 제패) 텍스트
 # ==========================================
 # 일지
 je_dhe_southern_expansion: "동아시아 제해권 장악 (열도 제패)"
 je_dhe_southern_expansion_reason: "과거 임진년의 원한과 수많은 침탈을 일삼았던 섬나라를 완전히 제압할 때가 왔습니다. 일본 열도의 모든 주와 대만을 점령하여, 태평양으로 뻗어나가는 제국의 발판을 마련하십시오."
 
 # 이벤트
 dhe_conquest_event.2.t: "동해의 떠오르는 태양"
 dhe_conquest_event.2.d: "마침내 제국의 함대가 도쿄만에 닻을 내렸고, 일본 열도 전역이 대한제국의 깃발 아래 무릎을 꿇었습니다! 수백 년간 이어져 온 악연의 고리를 끊어내고, 이제 동아시아의 진정한 제해권은 오직 우리 황실의 손아귀에 있습니다."
 dhe_conquest_event.2.f: "과거의 치욕을 백 배, 천 배로 되갚아 주었노라."
 dhe_conquest_event.2.a: "태평양은 이제 제국의 내해(內海)다!"
 
 # 커스텀 툴팁
 dhe_conquest_event_2_tt: "열도 및 대만 지역 본토 편입"
 dhe_conquest_event_2_desc_tt: "간토, 간사이 등 일본 열도 전역과 §Y포르모사(대만)§! 지역이 모두 §Y한국인 본토(Homeland)§!로 편입되며, 해군력과 외교적 위상을 대폭 높여주는 영구 버프를 얻습니다."
 
 dhe_university.1.t: "근대 교육의 요람"
 dhe_university.1.d: "광무개혁의 일환으로 추진된 전국적인 학제 개편과 소학교 설립이 마침내 성공적인 궤도에 올랐습니다. 수많은 인재들이 깨어나고 있으며, 이제 이들을 이끌어갈 국가 최고 학부가 필요하다는 목소리가 커지고 있습니다."
 dhe_university.1.f: "기초를 다졌으니, 이제 제국의 지성을 완성할 거대한 상아탑을 세울 차례입니다."
 dhe_university.1.a: "제국대학 설립을 추진하라!"

 je_dhe_seoul_national_university: "한성제국대학(서울대학교) 설립"
 je_dhe_seoul_national_university_reason: "국가의 백년대계를 이끌어갈 최고 인재를 양성하기 위해, 한성(서울)에 대규모 국립 대학을 설립해야 합니다. [concept_technology] '학술'을 연구하고, 한성에 [concept_university]를 5레벨 이상 건설하십시오."
 
 dhe_university.2.t: "서울대학교 설립 완료"
 dhe_university.2.d: "마침내 한성 한복판에 웅장한 대학 건물이 들어섰습니다. 전국 각지에서 모여든 수재들이 조국의 근대화와 부국강병을 위해 밤낮없이 학문에 매진하고 있습니다. 이곳은 명실상부한 제국 최고의 지성소가 될 것입니다!"
 dhe_university.2.f: "진리는 나의 빛 (Veritas Lux Mea)"
 dhe_university.2.a: "조선의 미래가 이곳에 있다!"
 

