 dhe_mod_northern_expansion_success: "북방의 패자"
 dhe_mod_northern_expansion_success_desc: "만주의 광활한 영토와 풍부한 자원을 확보한 제국은 대륙 세력으로서의 압도적인 국력과 군사적 안정성을 자랑합니다."

