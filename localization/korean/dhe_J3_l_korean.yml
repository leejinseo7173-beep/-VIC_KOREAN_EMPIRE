 dhe_mod_military_reform_success: "근대적 제국군의 탄생"
 dhe_mod_military_reform_success_desc: "구식 군대를 탈피하고 근대적 교리와 화기로 무장한 제국의 신식 군대가 탄생했습니다."
 
 dhe_mod_infrastructure_reform_success: "제국 기반시설 확충"
 dhe_mod_infrastructure_reform_success_desc: "항만과 철도의 기초가 닦여 국가 전반의 물류와 건설 효율이 상승했습니다."

