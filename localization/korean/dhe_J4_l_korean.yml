 # =============================================
 # 랜덤 이벤트 모디파이어 로컬라이제이션
 # =============================================

 # [A] 세도
 dhe_mod_royal_resolve: "왕권 수호의 결의"
 dhe_mod_royal_resolve_desc: "양반 세력의 조직적 저항을 꺾고 왕권을 수호한 결단이 조정에 긴장감과 위엄을 불어넣고 있습니다."
 dhe_mod_wind_of_reform: "개화의 바람"
 dhe_mod_wind_of_reform_desc: "개화파 유생들의 건백서를 수용하여 새로운 학문과 사상이 조정에 퍼지기 시작했습니다."

 # [B] 양전
 dhe_mod_iron_survey: "철권 양전"
 dhe_mod_iron_survey_desc: "무력으로 토호를 제압한 뒤 진행된 양전이 지방 관리들에게 엄중한 경고를 보내고 있습니다."
 dhe_mod_modern_survey: "근대 측량법 도입"
 dhe_mod_modern_survey_desc: "서양의 삼각측량법을 도입하여 토지 장부의 정확도가 비약적으로 향상되었습니다."

 # [C] 은결
 dhe_mod_inspector_authority: "암행어사의 위엄"
 dhe_mod_inspector_authority_desc: "왕명을 등에 업은 암행어사의 위엄 앞에 은닉 토지 소유자들이 두려움에 떨고 있습니다."
 dhe_mod_grand_exposure: "일망타진"
 dhe_mod_grand_exposure_desc: "함정 수사가 대성공하여 대규모 은닉 토지가 한꺼번에 적발되었습니다! 국고가 풍성해지고 왕실의 위신이 높아졌습니다."
 dhe_mod_investigation_exposed: "수사 노출"
 dhe_mod_investigation_exposed_desc: "함정 수사가 사전에 누설되어 증거가 인멸되고 관련자들이 도주했습니다. 감찰 체계의 신뢰가 흔들리고 있습니다."

 # [D] 군정
 dhe_mod_hopo_dawn: "호포법의 서광"
 dhe_mod_hopo_dawn_desc: "양반에게도 군포를 징수하는 호포법이 시행되어 조세의 형평성이 대폭 개선되고 있습니다. 양반들의 반발이 거세지만, 백성들은 환호하고 있습니다."
 dhe_mod_byeolgiying_pride: "별기영의 위용"
 dhe_mod_byeolgiying_pride_desc: "서양식 훈련을 받은 별기영의 위풍당당한 행군이 제국군의 사기를 드높이고 있습니다."

 # [E] 환곡
 dhe_mod_royal_grace: "성은이 망극"
 dhe_mod_royal_grace_desc: "황실이 내탕금을 풀어 굶주린 백성을 구휼한 소식에 온 나라가 감격하고 있습니다."
 dhe_mod_audit_blade: "감찰의 칼날"
 dhe_mod_audit_blade_desc: "장부를 소각한 향리를 체포하고 엄벌한 일이 전국에 알려져, 지방 관리들이 부패를 두려워하기 시작했습니다."

 # [F] 독립
 dhe_mod_independence_flame: "독립의 불꽃"
 dhe_mod_independence_flame_desc: "청나라의 혼란을 틈타 독립의 기반을 전격적으로 다진 결단이 온 나라에 자주의 열기를 불태우고 있습니다."
 dhe_mod_self_reliance: "자주의 기개"
 dhe_mod_self_reliance_desc: "청나라의 무리한 요구를 단호히 거부한 왕실의 기개에 백성들이 크게 감동하고 있습니다."

 # [G] 임오
 dhe_mod_military_discipline: "군기 확립"
 dhe_mod_military_discipline_desc: "신구 군대 간의 충돌을 엄히 다스린 후 군기가 바로잡히고 있습니다."
 dhe_mod_divided_barracks: "분열된 군영"
 dhe_mod_divided_barracks_desc: "신식 군대와 구식 군대의 충돌을 방치한 탓에 군영 내 불신과 반목이 깊어지고 있습니다."
 dhe_mod_iron_military_law: "철권 군율"
 dhe_mod_iron_military_law_desc: "무기고 습격 미수 주동자를 엄벌하여 군율이 바로잡혔습니다. 그러나 일부 병사들의 원한은 더 깊어졌을 수 있습니다."

 # [H] 광무
 dhe_mod_reform_blitz: "개혁의 쾌도"
 dhe_mod_reform_blitz_desc: "수구파의 음모를 역으로 이용하여 일망타진에 성공! 개혁의 걸림돌이 사라지고 근대화가 쾌속으로 진행되고 있습니다."
 dhe_mod_press_revolution: "언론 개국"
 dhe_mod_press_revolution_desc: "독립신문의 창간으로 백성들이 시사를 알고 여론을 형성하기 시작했습니다. 지식인들의 정치 참여가 활발해지고 있습니다."
 dhe_mod_modern_currency: "근대 화폐의 여명"
 dhe_mod_modern_currency_desc: "엽전을 폐지하고 금본위 화폐를 도입하여 경제 거래의 효율성이 비약적으로 향상되고 있습니다."
 dhe_mod_reform_acceleration: "개혁 가속"
 dhe_mod_reform_acceleration_desc: "개화파의 손을 들어준 황제의 결단으로 근대화 개혁이 더욱 빠르게 추진되고 있습니다."
 dhe_mod_conservative_stability: "보수적 안정"
 dhe_mod_conservative_stability_desc: "수구파의 우려를 수용하여 개혁의 속도를 늦춘 대신, 사회의 안정을 유지하고 있습니다."