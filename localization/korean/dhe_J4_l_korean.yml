 # =============================================
 # [I/J/K] 확장 모디파이어 로컬
 # =============================================
 dhe_mod_jiandao_harvest: "간도의 풍요"
 dhe_mod_jiandao_harvest_desc: "간도 흑토지대의 풍성한 수확이 이주민들에게 희망을 주고 더 많은 사람들을 끌어들이고 있습니다."
 dhe_mod_border_tension: "국경의 긴장"
 dhe_mod_border_tension_desc: "간도 국경에서 청국과의 마찰이 고조되어 수비 태세가 강화되고 있습니다."
 dhe_mod_jiandao_fortification: "간도 방어시설"
 dhe_mod_jiandao_fortification_desc: "간도 국경에 방어 시설이 구축되어 외부 위협으로부터 정착민을 보호하고 있습니다."
 dhe_mod_jiandao_education: "간도 교육 사업"
 dhe_mod_jiandao_education_desc: "간도에 세워진 조선어 학교가 이주민 자녀들에게 모국어와 정체성을 가르치고 있습니다."
 dhe_mod_jiandao_gold_rush: "간도 골드러시"
 dhe_mod_jiandao_gold_rush_desc: "간도 금광 개발이 활기를 띠면서 엄청난 부가 창출되고 이주민이 몰려들고 있습니다."
 dhe_mod_jiandao_autonomy: "간도 자치"
 dhe_mod_jiandao_autonomy_desc: "제한적 자치를 허용받은 간도 이주민 사회가 자체적으로 발전하며 충성심을 다지고 있습니다."
 dhe_mod_manchuria_trade: "원주민 교역"
 dhe_mod_manchuria_trade_desc: "연해주 원주민과의 우호적 교역으로 모피와 약초를 확보하고 정착의 안정성이 높아졌습니다."
 dhe_mod_manchuria_subjugation: "무력 복속"
 dhe_mod_manchuria_subjugation_desc: "원주민을 무력으로 복속시켜 자원은 확보했으나 원주민의 원한이 남아있습니다."
 dhe_mod_frozen_frontier: "동토의 변방"
 dhe_mod_frozen_frontier_desc: "기록적 한파로 정착촌이 큰 피해를 입어 이주민들의 사기가 떨어지고 있습니다."
 dhe_mod_russian_trade: "러시아 교역"
 dhe_mod_russian_trade_desc: "러시아 상인과의 교역으로 북방에서 필요한 물자를 안정적으로 확보하고 있습니다."
 dhe_mod_manchuria_timber: "연해주 벌목 사업"
 dhe_mod_manchuria_timber_desc: "연해주의 광활한 침엽수림에서 대규모 벌목 사업이 활발히 진행되어 목재 수출로 큰 수익을 올리고 있습니다."
 dhe_mod_outpost_established: "전초기지 확립"
 dhe_mod_outpost_established_desc: "연해주 핵심 거점에 견고한 전초기지가 확립되어 인근 지역의 기반시설과 이주 매력이 크게 향상되었습니다."
 dhe_mod_black_soil_development: "흑토지대 개발"
 dhe_mod_black_soil_development_desc: "만주의 비옥한 흑토지대에 대규모 농경지가 개발되어 풍부한 식량이 생산되고 있습니다."
 dhe_mod_manchu_integration: "만주족 포용 정책"
 dhe_mod_manchu_integration_desc: "귀순한 만주족을 포용하여 동화가 가속되고 통치의 정당성이 높아지고 있습니다."
 dhe_mod_manchu_suppression: "만주족 강경 통제"
 dhe_mod_manchu_suppression_desc: "만주족을 강경하게 통제하여 빠른 동화를 추진하고 있으나 반발이 잠재해 있습니다."
 dhe_mod_northern_railway: "북방 철도망"
 dhe_mod_northern_railway_desc: "한반도와 만주를 잇는 철도가 건설되어 북방 영토의 경제와 군사 운용이 비약적으로 향상되고 있습니다."
 dhe_mod_continental_garrison: "대륙 수비군"
 dhe_mod_continental_garrison_desc: "북방 영토를 전담하는 정예 대륙 수비군이 편성되어 광활한 영토를 견고히 지키고 있습니다."
 dhe_mod_goguryeo_heritage: "고구려의 유산"
 dhe_mod_goguryeo_heritage_desc: "만주에서 발견된 고구려 산성과 왕릉이 북방 경영의 역사적 정당성을 증명하며, 온 나라에 민족적 자긍심을 불어넣고 있습니다."

