l_korean:

 # =============================================
 # [A] 세도정치 타파 (왕권 회복)
 # =============================================
 dhe_random.1.t: "양반 대신의 횡포"
 dhe_random.1.d: "조정의 핵심 요직을 장악한 세도가문 출신 대신이 왕명을 무시하고 사사로이 관직을 매매하고 있다는 보고가 올라왔습니다.\n\n이를 엄단하면 왕권은 강화되겠으나 양반 세력의 거센 반발이 예상됩니다."
 dhe_random.1.f: "전하, 이 자를 그냥 두셔서는 아니 되옵니다."
 dhe_random.1.a: "즉시 파직하고 국문하라!"
 dhe_random.1.b: "아직은 참고 때를 기다리자..."

 dhe_random.2.t: "비밀 상소문 발견"
 dhe_random.2.d: "궐 안에서 세도 가문의 비밀 서신이 발견되었습니다. 왕위 계승에 개입하려는 음모의 정황이 드러나고 있습니다.\n\n이를 공개하면 양반 세력에 치명타를 가할 수 있으나 조정이 혼란에 빠질 수도 있습니다."
 dhe_random.2.f: "이 서신의 내용이 사실이라면..."
 dhe_random.2.a: "조정에 공개하고 관련자를 모두 체포하라!"
 dhe_random.2.b: "증거를 확보해 두되 조용히 대응하자."

 dhe_random.3.t: "양반 가문의 집단 사직 위협"
 dhe_random.3.d: "세도 타파 정책에 반발한 유력 양반 가문들이 조직적으로 관직을 내놓겠다고 협박하고 있습니다. 행정이 마비될 수 있습니다.\n\n왕권을 관철할 것인가, 한 발 물러설 것인가?"
 dhe_random.3.f: "성균관 유생 300인이 궐문 앞에서 복합상소를 올리고 있사옵니다."
 dhe_random.3.a: "과인의 뜻은 결코 변하지 않는다!"
 dhe_random.3.b: "전략적으로 한 발 물러서자."
 dhe_random.3.c: "개화파 지식인을 앞세워 여론을 분열시켜라."

 dhe_random.4.t: "충신의 간언"
 dhe_random.4.d: "세도정치의 해악을 직언하는 충신이 나타났습니다. 그의 건의는 합리적이나, 실행에는 시간과 인내가 필요합니다."
 dhe_random.4.f: "신은 목이 달아나도 이 말을 올리겠사옵니다."
 dhe_random.4.a: "경의 충정을 받아들이겠다."
 dhe_random.4.b: "좋은 말이나, 지금은 때가 아니다."

 dhe_random.5.t: "개화파 유생의 건백서"
 dhe_random.5.d: "서양 학문에 밝은 젊은 유생들이 세도정치 혁파와 인재 등용의 개혁안을 담은 건백서를 올렸습니다.\n\n이를 수용하면 지식인들의 지지를 얻겠으나, 수구파의 반발이 거세질 것입니다."
 dhe_random.5.f: "새 시대에는 새 사람이 필요하옵니다."
 dhe_random.5.a: "건백서를 채택하라! 인재를 등용하라!"
 dhe_random.5.b: "과격한 내용이 많다. 보류하겠다."

 # =============================================
 # [B] 양전 사업
 # =============================================
 dhe_random.6.t: "측량관의 보고"
 dhe_random.6.d: "팔도에 파견된 측량관이 돌아와, 실제 경작 면적이 장부와 크게 차이 난다고 보고했습니다. 정확한 양전을 위해서는 추가 자금이 필요합니다."
 dhe_random.6.f: "장부와 실제가 천양지차이옵니다."
 dhe_random.6.a: "추가 자금을 투입하여 철저히 조사하라!"
 dhe_random.6.b: "현재 인력으로 할 수 있는 만큼만 하라."

 dhe_random.7.t: "향리의 방해 공작"
 dhe_random.7.d: "지방 향리들이 측량 기구를 훼손하고 장부를 숨기는 등 양전 사업을 조직적으로 방해하고 있습니다."
 dhe_random.7.f: "간밤에 측량 도구가 모두 부서져 있었사옵니다."
 dhe_random.7.a: "방해자를 색출하여 엄히 다스리라!"
 dhe_random.7.b: "어쩔 수 없다... 다음 기회를 노리자."

 dhe_random.8.t: "토호의 무력 위협"
 dhe_random.8.d: "양전에 반발한 지방 토호가 사병을 동원하여 측량관을 위협하고 있습니다. 이대로 두면 양전 사업이 좌초될 수도 있습니다."
 dhe_random.8.f: "측량관이 목숨의 위협을 받고 있사옵니다!"
 dhe_random.8.a: "관군을 파견하여 토호를 제압하라!"
 dhe_random.8.b: "해당 지역 양전을 일시 중단하자."

 dhe_random.9.t: "백성들의 자발적 협조"
 dhe_random.9.d: "양전이 공정하게 진행되고 있다는 소문이 퍼지자, 일부 지역에서 백성들이 자발적으로 은닉된 토지를 신고하고 있습니다."
 dhe_random.9.f: "공정한 세상이 오고 있사옵니다!"
 dhe_random.9.a: "백성의 뜻을 기꺼이 받아들이겠다."

 dhe_random.10.t: "서양식 측량 기술 도입 제안"
 dhe_random.10.d: "개화파 관리가 서양의 근대적 측량 기술과 도구를 도입할 것을 건의했습니다. 비용이 크지만, 양전의 정확도와 속도가 비약적으로 향상될 것입니다."
 dhe_random.10.f: "서양의 삼각측량법은 실로 놀랍사옵니다."
 dhe_random.10.a: "즉시 도입하라! 비용을 아끼지 마라!"
 dhe_random.10.b: "기존 방식을 유지하되 점진적으로 개선하자."

 # =============================================
 # [C] 은결 색출
 # =============================================
 dhe_random.11.t: "내부 제보자 출현"
 dhe_random.11.d: "양반 가문의 하인이 몰래 찾아와, 주인이 은닉한 토지의 위치와 규모를 낱낱이 고발했습니다.\n\n이 정보를 활용할 것인가, 아니면 뇌물을 받고 눈감아줄 것인가?"
 dhe_random.11.f: "주인님의 은전(隱田)이 산 너머에 30결이옵니다..."
 dhe_random.11.a: "즉시 조사단을 파견하라!"
 dhe_random.11.b: "보상금을 주고 돌려보내라."

 dhe_random.12.t: "위조 토지 장부 발각"
 dhe_random.12.d: "감찰관이 지방 관아에서 이중으로 작성된 토지 장부를 발견했습니다. 진짜 장부에는 공식 기록의 두 배에 달하는 토지가 기재되어 있습니다."
 dhe_random.12.f: "장부가 두 벌이옵니다, 전하!"
 dhe_random.12.a: "위조범을 체포하고 진짜 장부를 확보하라!"
 dhe_random.12.b: "사본만 확보하고 조용히 넘어가자."

 dhe_random.13.t: "은닉지 소유자의 협박"
 dhe_random.13.d: "은결 색출에 쫓기던 유력 양반이 조정 대신들에게 뒷돈을 뿌리며 수사를 방해하고, 나아가 감찰관의 가족을 위협하고 있습니다."
 dhe_random.13.f: "감찰관의 가족이 인질로 잡혔사옵니다!"
 dhe_random.13.a: "왕명으로 직접 호위병을 보내라!"
 dhe_random.13.b: "위험하다... 이 건은 보류하자."
 dhe_random.13.c: "국고를 들여서라도 반드시 이 자를 잡아라!"

 dhe_random.14.t: "마을 주민의 증언"
 dhe_random.14.d: "은닉 토지 인근 마을 주민들이 자발적으로 증거를 제공하고 있습니다. 양반에게 시달려온 한이 서려 있는 증언들입니다."
 dhe_random.14.f: "저 땅은 원래 우리 마을 공유지였사옵니다..."
 dhe_random.14.a: "증언을 채록하고 보상하라."

 dhe_random.15.t: "암행어사의 함정 수사"
 dhe_random.15.d: "노련한 암행어사가 변복(變服)하고 은결 은닉 현장에 직접 잠입하여 증거를 수집하겠다고 자원했습니다.\n\n성공하면 대량의 은결을 한꺼번에 적발할 수 있으나, 실패하면 역으로 수사가 노출될 위험이 있습니다."
 dhe_random.15.f: "신이 직접 가겠사옵니다!"
 dhe_random.15.a: "좋다, 가라! (도박: 성공 60% / 실패 40%)"
 dhe_random.15.b: "위험하다. 정석대로 조사하자."

 # =============================================
 # [D] 군정 개혁
 # =============================================
 dhe_random.16.t: "암행어사, 군영 실태를 보고하다"
 dhe_random.16.d: "비밀리에 파견된 암행어사가 지방 군영을 시찰하고 돌아왔습니다. 병사들의 급료가 조직적으로 횡령되고 있으며, 실제 병력은 장부의 절반에 불과하다는 충격적인 보고입니다."
 dhe_random.16.f: "어사 출두!"
 dhe_random.16.a: "부패한 장교들을 즉시 처단하라!"
 dhe_random.16.b: "지금은 조용히 묻어두자..."

 dhe_random.17.t: "호포법 공론에 양반들이 격분!"
 dhe_random.17.d: "양반에게도 군포를 징수하겠다는 호포법 시행 소식에 전국의 양반들이 격렬히 반발하고 있습니다. 성균관이 수업을 거부하고, 지방에서는 집단 상소가 빗발치고 있습니다."
 dhe_random.17.f: "양반이 어찌 상놈과 같은 군포를 내란 말이냐!"
 dhe_random.17.a: "호포법은 반드시 관철한다! 반대자를 엄단하라!"
 dhe_random.17.b: "양반의 반발이 너무 거세다... 일단 후퇴하자."

 dhe_random.18.t: "신식 군대 훈련 성과"
 dhe_random.18.d: "별기영(別技營)에서 서양식 훈련을 받은 병사들이 우수한 성과를 보여주고 있습니다. 이들을 확대 편성하면 군제 개혁에 큰 힘이 될 것입니다."
 dhe_random.18.f: "서양식 제식훈련의 효과는 실로 놀랍사옵니다."
 dhe_random.18.a: "별기영을 확대 편성하라! 예산을 배정하라!"
 dhe_random.18.b: "현 규모를 유지하며 성과를 지켜보자."

 dhe_random.19.t: "군포 횡령 현장 포착"
 dhe_random.19.d: "지방 군영에서 징수한 군포가 병사에게 전달되지 않고 관리와 양반이 나눠가지는 현장이 포착되었습니다."
 dhe_random.19.f: "군포 천 냥이 관리의 주머니로 들어갔사옵니다."
 dhe_random.19.a: "관련자를 즉시 파직하라!"
 dhe_random.19.b: "증거만 확보하고 나중에 처리하자."

 dhe_random.20.t: "지방 무관의 탄원"
 dhe_random.20.d: "변방 수비를 맡은 무관이 병사들의 참상을 호소하는 탄원서를 올렸습니다. 겨울에도 솜옷 하나 없이 보초를 서고 있다는 내용입니다."
 dhe_random.20.f: "병사들이 짚신도 없이 맨발로 보초를 서고 있사옵니다."
 dhe_random.20.a: "즉시 군수 물자를 보급하라!"
 dhe_random.20.b: "안타깝지만 지금은 재정이 어렵다."

 # =============================================
 # [E] 환곡 타파
 # =============================================
 dhe_random.21.t: "밀곡 거래 적발"
 dhe_random.21.d: "향리들이 환곡으로 걷어들인 곡식을 빼돌려 사사로이 매매하고 있다는 밀고가 들어왔습니다."
 dhe_random.21.f: "전라도 암행어사의 비밀 장계가 도착했사옵니다."
 dhe_random.21.a: "밀곡 거래자를 엄벌에 처하라!"
 dhe_random.21.b: "이번만 눈을 감아주겠다..."

 dhe_random.22.t: "기근 지역 환곡 고리대 폭로"
 dhe_random.22.d: "흉년이 든 지역에서 환곡의 이자가 원금의 다섯 배에 달한다는 사실이 밝혀졌습니다. 백성들이 빚더미에 깔려 도망가거나 굶어 죽고 있습니다."
 dhe_random.22.f: "이자가 이자를 낳아 빚이 하늘까지 닿았사옵니다."
 dhe_random.22.a: "내탕금을 풀어 긴급 구휼하고 고리대를 탕감하라!"
 dhe_random.22.b: "안타깝지만 국고 사정이 여의치 않다."

 dhe_random.23.t: "사창제 시범 마을의 성과"
 dhe_random.23.d: "사창제를 시범 운영한 마을에서 긍정적인 보고가 올라왔습니다. 관아 대신 마을이 직접 곡물을 관리하니 횡령이 사라지고, 이자도 합리적으로 조정되었습니다."
 dhe_random.23.f: "백성이 직접 관리하니 비로소 공정해졌사옵니다."
 dhe_random.23.a: "사창제를 전국으로 확대하라!"

 dhe_random.24.t: "향리의 장부 소각 사건"
 dhe_random.24.d: "환곡 감사가 예정된 지역에서 향리가 몰래 장부를 불태운 사건이 발생했습니다. 증거 인멸을 시도한 것이 분명합니다."
 dhe_random.24.f: "관아 문서고에서 불길이 치솟았사옵니다!"
 dhe_random.24.a: "향리를 즉시 체포하고 재조사하라!"
 dhe_random.24.b: "장부가 없으니 증명할 수가 없다..."

 dhe_random.25.t: "굶주린 백성의 호소"
 dhe_random.25.d: "환곡의 폭정에 시달리던 백성들이 궁궐 앞에서 울부짖으며 구원을 호소하고 있습니다. 내탕금이라도 풀어 긴급 구제할 수 있습니다."
 dhe_random.25.f: "전하, 백성의 눈물을 거두어 주시옵소서!"
 dhe_random.25.a: "내탕금을 풀어 백성을 구하라!"
 dhe_random.25.b: "마음은 아프나, 국고를 더 쓸 수 없다."

 # =============================================
 # [F] 자주독립
 # =============================================
 dhe_random.26.t: "청국 사신의 오만한 행차"
 dhe_random.26.d: "청국 사신이 한양에 도착하여 마치 속국의 관리를 대하듯 거만한 태도를 보이고 있습니다.\n\n조정 대신들 사이에서 치욕감과 분노가 끓어오르고 있습니다."
 dhe_random.26.f: "사대의 예가 아니라, 이것은 모욕이옵니다!"
 dhe_random.26.a: "이를 악물고 참자... 아직은 때가 아니다."
 dhe_random.26.b: "당당히 맞서라! 우리는 속국이 아니다!"

 dhe_random.27.t: "대청제국, 내란에 빠지다!"
 dhe_random.27.d: "조선을 압박하던 청나라가 대규모 반란으로 혼란에 빠졌습니다. 사대의 사슬을 끊어낼 절호의 기회일 수 있으나, 성급한 행동은 보복을 부를 수 있습니다."
 dhe_random.27.f: "천재일우의 기회가 왔사옵니다, 전하!"
 dhe_random.27.a: "지금이다! 독립의 기틀을 전격적으로 다지자!"
 dhe_random.27.b: "아직은 때가 아니다. 실력을 더 기르자."

 dhe_random.28.t: "구미 열강에 밀사를 보내시겠습니까?"
 dhe_random.28.d: "측근이 서양 열강에 밀사를 파견하여 독립 의지를 알리고 국제적 지지를 얻자고 건의했습니다. 비용과 위험이 따르지만 성공하면 청나라를 견제할 수 있습니다."
 dhe_random.28.f: "만국공법(萬國公法)의 힘을 빌리자는 것이옵니다."
 dhe_random.28.a: "밀사를 파견하라!"
 dhe_random.28.b: "너무 위험하다. 발각되면 청의 보복이 두렵다."

 dhe_random.29.t: "독립의 대가를 묻는 사건"
 dhe_random.29.d: "청나라가 조선에 추가 조공을 요구하며 왕실의 체면을 짓밟았습니다. 조정 안팎에서 분노가 폭발하고 있으나, 거부하면 즉각적인 보복이 올 수 있습니다."
 dhe_random.29.f: "치욕을 견딜 것인가, 일어설 것인가!"
 dhe_random.29.a: "조공을 거부한다! 백성의 자존심을 지켜라!"
 dhe_random.29.b: "울분을 삼키고... 힘을 기르자."

 dhe_random.30.t: "일본의 이간질"
 dhe_random.30.d: "일본 공사가 은밀히 접촉하여 '청나라를 함께 견제하자'며 동맹을 제안해 왔습니다. 그러나 일본의 속셈이 순수할 리 없습니다."
 dhe_random.30.f: "적의 적은 과연 친구일까?"
 dhe_random.30.a: "일본의 제안을 거부하고 독자 노선을 걷는다."
 dhe_random.30.b: "일단 일본과의 관계를 개선해 두자."

 # =============================================
 # [G] 임오군란 위기
 # =============================================
 dhe_random.31.t: "병영에서 소란이!"
 dhe_random.31.d: "체납된 급료에 분노한 구식 군영의 병사들이 밤중에 모여 집단으로 항의하고 있습니다. 아직은 소규모이나 방치하면 걷잡을 수 없습니다."
 dhe_random.31.f: "선혜청 앞에서 병사들이 돌을 던지고 있사옵니다!"
 dhe_random.31.a: "긴급히 일부 급료라도 지급하라!"
 dhe_random.31.b: "하찮은 소란이다. 무시하라."
 dhe_random.31.c: "과인이 직접 병사 대표를 접견하겠다."

 dhe_random.32.t: "선혜청 비리 발각"
 dhe_random.32.d: "병사들에게 지급할 쌀에 모래와 겨를 섞어 무게를 부풀리고 차액을 착복하고 있었다는 사실이 드러났습니다.\n\n이 소식이 군영에 퍼지면 분노가 폭발할 것이고, 덮으면 부패가 더욱 깊어질 것입니다."
 dhe_random.32.f: "쌀 한 가마에 모래가 반이옵니다!"
 dhe_random.32.a: "책임자를 즉시 파직하고 엄벌하라!"
 dhe_random.32.b: "조용히 묻어두자... 지금 건드리면 행정이 마비된다."

 dhe_random.33.t: "구식 군인들의 투서"
 dhe_random.33.d: "구식 군영에서 익명의 투서가 발견되었습니다. 급료 지급과 신식 군대와의 차별 시정을 요구하는 내용이나, 문체가 점점 과격해지고 있습니다."
 dhe_random.33.f: "우리도 같은 군인인데 어찌 이리 다르단 말이냐!"
 dhe_random.33.a: "투서의 요구를 일부라도 수용하자."
 dhe_random.33.b: "투서의 주동자를 색출하여 처벌하라."

 dhe_random.34.t: "신식 군대와 구식 군대의 충돌"
 dhe_random.34.d: "별기영(신식)과 무위영(구식) 병사들 사이에서 대규모 난투가 벌어졌습니다. 양측 다 부상자가 속출하고 있으며, 이대로 두면 본격적인 군란으로 번질 수 있습니다."
 dhe_random.34.f: "별기영 놈들이 우리를 개무시한다!"
 dhe_random.34.a: "양측을 즉시 격리하고 엄히 다스리라!"
 dhe_random.34.b: "내버려 둬라. 스스로 해결하게 하라."
 dhe_random.34.c: "양측에 위로금을 지급하고 합동 연회를 열어라."

 dhe_random.35.t: "무기고 습격 미수"
 dhe_random.35.d: "분노가 극에 달한 구식 군인 일부가 밤중에 무기고를 습격하려다 보초에게 발각되어 저지당했습니다.\n\n이제 사태는 임계점에 다다르고 있습니다. 근본적인 조치가 필요합니다."
 dhe_random.35.f: "무기고의 자물쇠가 뜯겨져 있었사옵니다!"
 dhe_random.35.a: "주동자를 엄벌하고 즉시 급료를 전액 지급하라!"
 dhe_random.35.b: "어차피 미수에 그쳤다. 경고만 하고 넘어가자."

# =============================================
 # [H] 광무개혁 랜덤 이벤트 (20개)
 # =============================================
 
 # H-1: 열강의 기술 원조 제안
 dhe_random.36.t: "열강의 기술 원조 제안"
 dhe_random.36.d: "서양 열강의 외교관이 근대식 공장 설비와 기술 고문단을 파견하겠다는 제안을 해 왔습니다.\n\n받아들이면 개혁이 가속되겠으나, 경제적 종속의 빌미가 될 수도 있습니다."
 dhe_random.36.f: "기술에는 대가가 따르는 법이옵니다."
 dhe_random.36.a: "전면적으로 수용하라."
 dhe_random.36.b: "외세의 도움 없이 자력으로 해내겠다."
 dhe_random.36.c: "핵심 기술만 선별적으로 도입하라."
 
 # H-2: 수구파의 개혁 저지 음모
 dhe_random.37.t: "수구파의 은밀한 개혁 저지 공작"
 dhe_random.37.d: "광무개혁에 반발한 수구파 양반들이 궁중에서 은밀히 세력을 결집하여 개혁 주도 세력을 축출하려는 음모를 꾸미고 있습니다."
 dhe_random.37.f: "칼은 이미 뽑혔사옵니다, 전하."
 dhe_random.37.a: "사전에 차단하라!"
 dhe_random.37.b: "한 발 물러서서 타협하자."
 dhe_random.37.c: "역으로 함정을 파서 일망타진한다! (도박)"
 
 # H-3: 공장 건설 투자 기회
 dhe_random.38.t: "새 공장 건설의 기회"
 dhe_random.38.d: "상인들이 한성 인근에 대규모 방직 공장을 세울 부지를 발견했습니다. 국가가 투자하면 산업화에 큰 도움이 됩니다."
 dhe_random.38.f: "이 땅에 굴뚝이 솟는 날을 꿈꿉니다."
 dhe_random.38.a: "대규모로 투자하라!"
 dhe_random.38.b: "소규모로 시작하자."
 dhe_random.38.c: "지금은 다른 곳에 재정을 쓰겠다."
 
 # H-4: 유학생 귀국 보고
 dhe_random.39.t: "해외 유학생들의 귀국"
 dhe_random.39.d: "일본과 미국에서 근대 학문을 익힌 젊은 인재들이 속속 귀국하고 있습니다. 다만 수구파 대신들은 이들을 경계하고 있습니다."
 dhe_random.39.f: "배움에는 국경이 없사옵니다."
 dhe_random.39.a: "즉시 관직에 등용하라!"
 dhe_random.39.b: "신원 조사를 마칠 때까지 관망하겠다."
 
 # H-5: 철도 건설 사고
 dhe_random.40.t: "철도 공사 현장에서 대형 사고!"
 dhe_random.40.d: "경부선 구간 공사 현장에서 터널이 붕괴하여 인부 수십 명이 매몰되는 대형 사고가 발생했습니다."
 dhe_random.40.f: "현장에서 비명이 울려퍼지고 있사옵니다..."
 dhe_random.40.a: "즉시 구조하고 재건 자금을 배정하라!"
 dhe_random.40.b: "안타깝지만... 예산이 부족하다."
 
 # H-6: 외국 자본 유치 제안
 dhe_random.41.t: "외국 자본의 투자 제안"
 dhe_random.41.d: "서양 은행가가 대규모 차관을 제공하겠다고 제안해 왔습니다. 빠른 근대화의 기회이나 경제적 주권이 침해될 위험이 있습니다."
 dhe_random.41.f: "금(金)에는 항상 줄이 달려 있사옵니다."
 dhe_random.41.a: "전면 수용한다."
 dhe_random.41.b: "선별적으로 수용하되 주권을 지켜라."
 dhe_random.41.c: "외채는 나라를 망하게 한다. 거부하라."
 
 # H-7: 한성 전등 가설 성공
 dhe_random.42.t: "한성에 전등(電燈)이 켜지다!"
 dhe_random.42.d: "경복궁과 한성 주요 거리에 전등이 가설되어 밤에도 대낮같이 환해졌습니다! 백성들이 근대화의 성과를 체감하고 있습니다."
 dhe_random.42.f: "불 없이도 밝은 세상이 왔사옵니다!"
 dhe_random.42.a: "온 나라에 광무개혁의 성과를 알려라!"
 
 # H-8: 근대화 반발 농민 시위
 dhe_random.43.t: "근대화에 반발하는 백성들"
 dhe_random.43.d: "철도와 전선 가설 과정에서 농경지가 수용되자 지방 농민들이 격렬히 항의하고 있습니다. '서양 요괴의 줄이 국운을 끊는다'는 유언비어도 퍼지고 있습니다."
 dhe_random.43.f: "쇠말(기차)이 지나간 자리에는 풀이 안 자란다더이다!"
 dhe_random.43.a: "진압하라. 개혁을 멈출 수는 없다."
 dhe_random.43.b: "보상금을 지급하고 민심을 달래라."
 dhe_random.43.c: "개화파 관리를 보내 설명회를 열어라."
 
 # H-9: 만국박람회 참가 제안
 dhe_random.44.t: "만국박람회(萬國博覽會) 참가 제안"
 dhe_random.44.d: "서양에서 개최되는 만국박람회에 대한제국 전시관을 마련하자는 건의가 올라왔습니다."
 dhe_random.44.f: "세계에 대한제국의 위용을 보여줍시다!"
 dhe_random.44.a: "성대하게 참가하라!"
 dhe_random.44.b: "소규모로 참가하자."
 dhe_random.44.c: "지금은 국내 개혁에 집중하겠다."
 
 # H-10: 군수 공장 화재
 dhe_random.45.t: "군수 공장에서 대형 화재!"
 dhe_random.45.d: "한성 인근의 무기 제조 공장에서 원인 불명의 대형 화재가 발생했습니다. 방화 가능성도 있습니다."
 dhe_random.45.f: "화약고에 불이 옮겨붙기 직전에 겨우 막았사옵니다."
 dhe_random.45.a: "즉시 재건하고 방화범을 색출하라!"
 dhe_random.45.b: "재정이 부족하다... 당분간 보류하자."
 
 # =============================================
 # [H 확장] 추가 10개
 # =============================================
 
 # H-11: 독립신문 창간
 dhe_random.46.t: "독립신문 창간!"
 dhe_random.46.d: "서재필이 순한글로 된 신문 '독립신문'을 창간하겠다고 건의했습니다. 백성들이 스스로 시사를 알고 여론을 형성할 수 있게 될 것입니다.\n\n그러나 수구파는 '상놈들에게 글을 가르치면 나라가 망한다'며 격렬히 반대하고 있습니다."
 dhe_random.46.f: "알아야 면장을 하지!"
 dhe_random.46.a: "적극 후원하라! 언론은 개혁의 무기다!"
 dhe_random.46.b: "묵인은 하되 직접 개입은 않겠다."
 dhe_random.46.c: "위험하다. 여론을 통제할 수 없게 된다. 탄압하라."
 
 # H-12: 전신선(電信線) 개통
 dhe_random.47.t: "한성~부산 전신선 개통!"
 dhe_random.47.d: "수개월에 걸친 공사 끝에 한성과 부산을 잇는 전신선이 마침내 개통되었습니다! 이제 하루가 걸리던 소식이 순식간에 전달됩니다.\n\n백성들은 '번개줄'이라 부르며 신기해하고 있습니다."
 dhe_random.47.f: "한성에서 부산까지 한 시진도 안 걸리옵니다!"
 dhe_random.47.a: "전국으로 전신망을 확장하라!"
 dhe_random.47.b: "우선 현 구간을 안정화하자."
 
 # H-13: 양반 자제의 근대 학교 거부
 dhe_random.48.t: "양반 자제들의 신식 학교 등교 거부"
 dhe_random.48.d: "광무개혁의 일환으로 세운 근대식 소학교에 양반 가문의 자제들이 등교를 거부하고 있습니다. '서양 오랑캐의 학문을 배울 수 없다'는 것이 이유입니다.\n\n이를 강제할 것인가, 설득할 것인가?"
 dhe_random.48.f: "공자님의 가르침 외에 무엇이 더 필요하단 말이냐!"
 dhe_random.48.a: "의무교육은 왕명이다. 불복하면 처벌하라!"
 dhe_random.48.b: "유교 과목도 포함하여 설득하자."
 dhe_random.48.c: "양반은 양반대로 두자... 평민 교육에 집중하겠다."
 
 # H-14: 외국인 기술자 분쟁
 dhe_random.49.t: "외국인 기술자와 조선인 노동자의 충돌"
 dhe_random.49.d: "공장에서 일하는 외국인 기술자가 조선인 노동자를 구타하는 사건이 발생했습니다. 노동자들이 집단 파업을 선언했고, 외국인 기술자는 본국 영사관에 보호를 요청했습니다.\n\n근대화를 위해 외국인을 감싸면 민심을 잃고, 조선인 편을 들면 기술 이전이 중단될 수 있습니다."
 dhe_random.49.f: "사람이 사람을 때리는데 나라가 다르다고 참으란 말이냐!"
 dhe_random.49.a: "외국인의 잘못이다. 조선의 법으로 처리하라."
 dhe_random.49.b: "근대화를 위해... 이번은 넘어가자."
 dhe_random.49.c: "양측을 중재하여 합의를 이끌어내라."
 
 # H-15: 양지아문 토지 측량 보고
 dhe_random.50.t: "양지아문(量地衙門)의 근대식 토지 측량 보고"
 dhe_random.50.d: "광무개혁의 핵심 기관인 양지아문이 서양식 삼각측량법으로 한성 인근의 토지를 정밀 측량한 결과를 보고했습니다.\n\n기존 장부와 실제 면적의 차이가 어마어마합니다. 전국으로 확대하면 세수가 대폭 늘겠으나 비용과 반발이 만만치 않습니다."
 dhe_random.50.f: "서양 측량법의 정밀함에 모두가 놀라고 있사옵니다."
 dhe_random.50.a: "전국으로 즉시 확대하라!"
 dhe_random.50.b: "현 범위에서 성과를 다진 뒤 확대하자."
 
 # H-16: 한성 상수도 공사
 dhe_random.51.t: "한성 상수도 공사 제안"
 dhe_random.51.d: "미국인 기술자 콜브란이 한성에 근대식 상수도를 건설하겠다는 제안을 올렸습니다.\n\n완성되면 전염병이 대폭 줄고 도시 위생이 혁명적으로 개선될 것입니다. 그러나 공사 비용이 상당합니다."
 dhe_random.51.f: "맑은 물이 관(管)을 타고 집집마다 흐르게 됩니다!"
 dhe_random.51.a: "대규모로 투자하여 완벽히 건설하라!"
 dhe_random.51.b: "핵심 구역만 우선 시공하자."
 dhe_random.51.c: "지금은 다른 사업이 급하다. 보류하겠다."
 
 # H-17: 외국 군사 교관단 초빙 제안
 dhe_random.52.t: "외국 군사 교관단 초빙 제안"
 dhe_random.52.d: "참모부에서 제국군의 전투력 향상을 위해 서양 군사 교관단을 초빙하자는 건의서를 올렸습니다.\n\n교관단이 오면 근대전 교리를 빠르게 흡수할 수 있으나, 군사 기밀이 노출될 위험도 있습니다."
 dhe_random.52.f: "서양의 전법을 배워야 서양을 이길 수 있사옵니다."
 dhe_random.52.a: "초빙하라. 배움에는 체면이 없다."
 dhe_random.52.b: "자력으로 교범을 번역하여 양성하겠다."
 dhe_random.52.c: "군사 기밀이 위험하다. 거부하겠다."
 
 # H-18: 화폐 개혁 시도
 dhe_random.53.t: "근대적 화폐 제도 도입 시도"
 dhe_random.53.d: "탁지부(재무부)에서 엽전을 폐지하고 서양식 금본위 화폐 제도를 도입하자는 대개혁안을 올렸습니다.\n\n성공하면 경제가 근대화되겠으나, 백성들이 새 화폐를 거부하면 혼란이 걷잡을 수 없어질 것입니다."
 dhe_random.53.f: "엽전 열 닢이면 새 화폐 일 원에 해당하옵니다."
 dhe_random.53.a: "전면 시행하라! 근대 경제의 초석이다!"
 dhe_random.53.b: "점진적으로 병행 운용하며 전환하자."
 dhe_random.53.c: "시기상조다. 보류하겠다."
 
 # H-19: 개화파 vs 수구파 조정 논쟁
 dhe_random.54.t: "개화파와 수구파, 조정에서 격돌!"
 dhe_random.54.d: "광무개혁의 속도를 두고 개화파와 수구파가 조정에서 격렬히 충돌하고 있습니다.\n\n개화파는 '하루가 급하다'며 급진 개혁을 주장하고, 수구파는 '나라의 근본을 흔들 수 없다'며 완강히 반대합니다. 어느 쪽의 손을 들어줄 것인가?"
 dhe_random.54.f: "전하, 결단을 내려 주시옵소서!"
 dhe_random.54.a: "개화파의 손을 들겠다. 개혁을 가속하라!"
 dhe_random.54.b: "수구파의 우려에도 일리가 있다. 속도를 늦추자."
 dhe_random.54.c: "양측 모두 과인의 신하다. 타협점을 찾아라."
 
 # H-20: 근대 병원(광혜원) 설립 제안
 dhe_random.55.t: "근대 병원 설립 제안"
 dhe_random.55.d: "선교사 알렌이 서양식 병원 '광혜원(廣惠院)'을 설립하겠다고 건의했습니다.\n\n서양 의술의 효과는 이미 입증되었으나, 일부 유생들은 '양귀(洋鬼)의 요술'이라며 반대하고 있습니다."
 dhe_random.55.f: "사람의 목숨 앞에 동서양의 구분이 있겠사옵니까."
 dhe_random.55.a: "국비로 설립하라! 백성의 목숨이 급하다."
 dhe_random.55.b: "선교사의 자비(自費) 설립을 허가하라."
 dhe_random.55.c: "서양 의술은 아직 검증이 부족하다. 보류하겠다."