 # 이벤트 텍스트
 dhe_character_event.1.t: "구국의 영웅들, 궐기하다"
 dhe_character_event.1.d: "군제 개혁이 성공적으로 완수되고 제국군의 위용이 하늘을 찌르자, 재야에 숨어 있던 걸출한 인재들이 황제의 부름을 받고 속속 모여들고 있습니다.\n\n특히 투철한 충성심으로 무장한 관료 [scope_min.GetFullName]과, 혈서로 구국의 의지를 다진 청년 장교 [scope_ahn.GetFullName]이 직접 군문을 두드리며 제국군의 선봉에 설 것을 맹세했습니다!"
 dhe_character_event.1.f: "국가의 위기 앞에 영웅이 탄생하는 법이다. 이들이 이끄는 제국군은 결코 패배하지 않을 것이다."
 dhe_character_event.1.a: "제국의 검과 방패가 되어 열강을 징벌하라!"
# 박정희 등장 이벤트 텍스트
 dhe_character_event.2.t: "구국의 결단"
 dhe_event.2.d: "제국의 정치가 부패와 무능으로 혼란에 빠진 가운데, 군부 내에서 강력한 결단력을 지닌 청년 장교들이 궐기했습니다.\n\n그 중심에는 야심만만하고 냉혹한 현실주의자, 박정희 장군이 있습니다. 그는 무능한 기존 정치인들을 모두 몰아내고 군부를 장악했으며, 제국의 최우선 과제는 오직 '강력한 국가 주도의 조국 근대화'뿐이라고 일갈했습니다. 그의 등장에 정계는 숨을 죽였고, 제국의 용광로는 더욱 뜨겁게 타오를 준비를 마쳤습니다."
 dhe_character_event.2.a: "내 일생 조국과 민족을 위하여!"'
# 특성 추가
# 이념
 ideology_developmental_autocrat:0 "조국 근대화 (개발독재)"
 ideology_developmental_autocrat_desc:0 "이 이념을 따르는 지도자는 국가의 모든 역량을 총동원하여 급진적인 경제 성장과 산업화를 이룩해야 한다고 굳게 믿으며, 이를 방해하는 어떠한 정치적 반대나 민주적 절차도 철권통치로 억압할 것입니다."

 # 특성
 trait_miracle_on_the_han:0 "조국 근대화의 설계자"
 trait_miracle_on_the_han_desc:0 "이 인물은 낙후된 국가를 뜯어고쳐 강력한 산업 국가로 탈바꿈시킬 원대한 비전과 추진력을 가지고 있습니다."
 trait_iron_fisted_ruler:0 "철권통치"
 trait_iron_fisted_ruler_desc:0 "이 인물은 반대파를 무자비하게 탄압하고 국가 권력을 철저히 장악하여 절대적인 질서를 유지합니다." 
trait_saemaul_undong:0 "새마을 운동"
 trait_saemaul_undong_desc:0 "'근면, 자조, 협동'의 정신을 바탕으로 낙후된 농촌을 개혁하고 제국 전역의 인프라를 현대화하는 범국가적 캠페인을 주도합니다."
 trait_for_the_nation:0 "내 일생 조국과 민족을 위하여"
 trait_for_the_nation_desc:0 "이 지도자는 자신의 모든 삶과 체력을 국가의 부국강병을 위해 남김없이 불태우고 있으며, 이러한 헌신은 국민들에게 압도적인 카리스마와 결속력을 이끌어냅니다."
trait_export_oriented:0 "수출입국 (輸出立國)"
 trait_export_oriented_desc:0 "국내의 좁은 시장을 넘어 세계로 뻗어나가는 강력한 수출 주도형 경제를 설계하여, 기술 발전과 국부 창출을 극대화합니다."
 trait_self_reliant_defense:0 "자주국방 (自主國防)"
 trait_self_reliant_defense_desc:0 "열강의 군사적 위협에 굴복하지 않고, 우리 손으로 직접 첨단 무기를 개발하여 압도적인 포병 화력과 군사력을 구축합니다."