l_korean:
 # ==========================================
 # 북방 고토 회복 (만주 수복) 텍스트
 # ==========================================
 # 일지
 je_dhe_northern_expansion: "북방 고토 회복 (만주 수복)"
 je_dhe_northern_expansion_reason: "과거 고구려와 발해가 호령했던 만주의 드넓은 영토를 되찾아야 합니다. 청나라와 러시아의 간섭을 물리치고 §Y성경, 남만주, 북만주, 아무르§!를 비롯해 §Y간도, 길림, 열하§! 등 북방의 핵심 주 전체를 수복하여 제국의 영토로 편입하십시오."
 
 # 이벤트
 dhe_conquest_event.1.t: "북방의 패자"
 dhe_conquest_event.1.d: "마침내 압록강과 두만강을 넘어, 잃어버렸던 북방의 드넓은 고토가 다시 대한제국의 품으로 돌아왔습니다! 대륙을 호령하던 선조들의 영광이 천 년의 세월을 뛰어넘어 다시금 이 땅에 울려 퍼지고 있습니다."
 dhe_conquest_event.1.f: "만주벌판을 내달리는 제국 기병대의 말발굽 소리가 대지를 진동시킵니다."
 dhe_conquest_event.1.a: "단군의 옛 영광을 되찾았도다!"
 
 # 커스텀 툴팁
 dhe_conquest_event_1_tt: "만주 지역 본토 편입"
 dhe_conquest_event_1_desc_tt: "성경, 아무르 등 기존 만주 일대와 수복된 §Y간도, 길림, 열하§! 지역이 모두 §Y한국인 본토(Homeland)§!로 편입되며, 강력한 국가 위신과 동화 속도 버프를 영구적으로 얻습니다."
 

 
 dhe_great_korea_ambition:0 "황실의 원대한 야망"
 dhe_great_korea_ambition_desc:0 "한반도는 너무 좁다. 북으로는 잃어버린 고토를 수복하여 대륙으로 뻗어나가고, 남으로는 왜구의 본거지를 정벌하여 동아시아의 진정한 패자가 되어야 한다."
 dhe_great_korea_ambition_tooltip:0 "만주와 일본, 대만 전역에 대한 [concept_claim]을 획득합니다."

 # 11. 일지 - 대동아 정복
 je_dhe_great_korea_conquest:0 "대동아 통합 전쟁"
 je_dhe_great_korea_conquest_desc:0 "만주와 일본 열도, 대만을 우리의 영토로 편입하여 동아시아의 패권을 확립한다.\n\n[concept_sovereignty]를 완전히 장악해야 한다."
 je_dhe_great_korea_conquest_goal:0 "만주 4개 주, 일본 9개 주, 대만 1개 주를 모두 완전 점령"
 je_dhe_great_korea_conquest_reason:0 "만주와 일본 열도, 대만을 우리의 영토로 편입하여 동아시아의 패권을 확립한다.\n\n[concept_sovereignty]를 완전히 장악해야 한다."


# ==========================================
 # 남방 정벌 (일본 및 대만 제패) 텍스트
 # ==========================================
 # 일지
 je_dhe_southern_expansion: "동아시아 제해권 장악 (열도 제패)"
 je_dhe_southern_expansion_reason: "과거 임진년의 원한과 수많은 침탈을 일삼았던 섬나라를 완전히 제압할 때가 왔습니다. 일본 열도의 모든 주와 대만을 점령하여, 태평양으로 뻗어나가는 제국의 발판을 마련하십시오."
 
 # 이벤트
 dhe_conquest_event.2.t: "동해의 떠오르는 태양"
 dhe_conquest_event.2.d: "마침내 제국의 함대가 도쿄만에 닻을 내렸고, 일본 열도 전역이 대한제국의 깃발 아래 무릎을 꿇었습니다! 수백 년간 이어져 온 악연의 고리를 끊어내고, 이제 동아시아의 진정한 제해권은 오직 우리 황실의 손아귀에 있습니다."
 dhe_conquest_event.2.f: "과거의 치욕을 백 배, 천 배로 되갚아 주었노라."
 dhe_conquest_event.2.a: "태평양은 이제 제국의 내해(內海)다!"
 
 # 커스텀 툴팁
 dhe_conquest_event_2_tt: "열도 및 대만 지역 본토 편입"
 dhe_conquest_event_2_desc_tt: "간토, 간사이 등 일본 열도 전역과 §Y포르모사(대만)§! 지역이 모두 §Y한국인 본토(Homeland)§!로 편입되며, 해군력과 외교적 위상을 대폭 높여주는 영구 버프를 얻습니다."
 
