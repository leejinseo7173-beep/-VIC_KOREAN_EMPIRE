 # 10. 일지 - 기반시설 정비
 je_dhe_gwangmu_infrastructure:0 "기반시설 정비"
 je_dhe_gwangmu_infrastructure_desc:0 "항만과 건설 능력을 확충해 국력을 받친다."
 je_dhe_gwangmu_infrastructure_goal:0 "항만, 건설업, 도시 중심지 중 하나 이상 건설"
 je_dhe_gwangmu_infrastructure_reason:0 "항만과 건설 능력을 확충해 국력을 받친다."

 dhe_hangeul_edu_prepare_req_reform_tt:0 "광무개혁이 시작되어야 합니다"
 dhe_hangeul_edu_prepare_req_not_preparing_tt:0 "아직 한글 교육을 준비 중이 아니어야 합니다"
 dhe_hangeul_edu_prepare_req_not_completed_tt:0 "아직 한글 교육이 완료되지 않았어야 합니다"

 dhe_start_gwangmu_reform_decision: "광무개혁 선포"
 dhe_start_gwangmu_reform_decision_desc: "이제 우리는 당당한 자주 독립 제국이 되었습니다. 낡은 악습을 타파하고, 구본신참(舊本新參)의 정신으로 제국 전역을 근대화하는 거대한 개혁을 시작할 때입니다."
 dhe_start_gwangmu_reform_decision_tooltip: "제국의 전 권역을 대상으로 하는 거대한 산업화 및 개혁 일지들이 시작됩니다."
 dhe_start_gwangmu_reform_tt: "광무개혁 연계 일지들이 활성화됩니다."
 
 je_korea_capital_industry: "제국의 심장, 한성 대개조"
 je_korea_capital_industry_reason: "반만년 역사의 중심이자 황은이 머무는 한성, 그리고 그를 호위하는 해서는 마땅히 천하의 으뜸가는 근대 대도시로 거듭나야 합니다. 낡은 초가를 허물고 마천루와 굴뚝을 세워, 오만한 열강의 사신들이 제국의 웅장한 위용 앞에 고개 숙이게 하십시오."
 je_korea_capital_industry_desc: "수도권 일대에 근대적인 복합 산업 단지를 조성해야 합니다."
 korea_capital_industry_goal_tt: "다음 핵심 인프라를 모두 확충하십시오:\n- 한성(서울) 지역에 도심지 5레벨 및 행정부 3레벨 이상 건설\n- 해서 지역에 대학교 2레벨 이상 건설"


 je_korea_south_industry: "삼남 식산흥업 (殖産興業)"
 je_korea_south_industry_reason: "삼남의 비옥한 대지는 예로부터 우리 민족을 먹여 살린 굳건한 젖줄이었습니다. 이제 이 풍요로운 들판에 근대적 농법의 결실과 방직 기계의 굉음을 더할 때입니다. 백성을 배불리 먹이고 천하를 우리의 비단으로 덮어 완전한 자립 경제를 이룩해야 합니다."
 je_korea_south_industry_desc: "충청 및 양호 일대의 농업 생산력을 극대화하고 경공업을 육성해야 합니다."
 korea_south_industry_goal_tt: "다음 핵심 인프라를 모두 확충하십시오:\n- 충청 지역에 방직 공장 3레벨 및 식료품 공장 3레벨 이상 건설\n- 양호(전라) 지역에 쌀 농장 10레벨 이상 건설"


 je_korea_busan_industry: "제국 해양 진출의 교두보, 부산"
 je_korea_busan_industry_reason: "망망대해로 뻗어가는 관문인 부산. 우물 안 개구리였던 뼈저린 과거를 뒤로하고, 이제 우리는 거친 바다를 지배해야 합니다. 시뻘건 쇳물로 빚어낸 거대한 철갑선들을 진수시켜 제국의 당당한 깃발을 태평양 너머까지 휘날리게 하십시오."
 je_korea_busan_industry_desc: "부산 일대에 대규모 중공업 단지와 조선소를 건설해야 합니다."
 korea_busan_industry_goal_tt: "다음 핵심 인프라를 모두 확충하십시오:\n- 부산 지역에 조선소 3레벨, 전동기 공장 2레벨, 철강 공장 3레벨 이상 건설"


 je_korea_north_industry: "북방의 검은 황금과 철혈 (鐵血)"
 je_korea_north_industry_reason: "서릿발 날리는 관동의 영봉과 평양, 사리원의 깊은 땅속에는 제국을 강철의 거인으로 깨울 무한한 동력이 잠들어 있습니다. 곡괭이와 다이너마이트로 산맥을 허물고 솟구치는 석탄과 철광석으로 부국강병의 뼈대를 주조하십시오."
 je_korea_north_industry_desc: "북부 일대의 광산을 집중적으로 개발하고 중공업 기반을 다져야 합니다."
 korea_north_industry_goal_tt: "다음 핵심 인프라를 모두 확충하십시오:\n- 평양 지역에 석탄 광산 5레벨 및 공구 공장 3레벨 이상 건설\n- 사리원 지역에 철 광산 5레벨 이상 건설\n- 관동 지역에 벌목장 5레벨 이상 건설"

