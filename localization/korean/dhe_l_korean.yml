l_korean:
 # 1. 국가 이름
 DHE:0 "대한제국"
 DHE_ADJ:0 "대한제국"
 DHE_DEF:0 "대한제국"

 dhe_event.2.t:0 "천하통일(天下統一): 대동아의 진정한 주인"
 dhe_event.2.d:0 "북으로는 광활한 만주 벌판의 옛 고토를 수복하여 고구려와 발해의 기상을 되찾았고, 남으로는 현해탄을 건너 일본 열도와 대만까지 우리의 강역으로 복속시켰다.\n\n이것은 단순한 영토 확장이 아니다. 단군 이래 최대의 과업이자, 서구 열강의 침탈로부터 아시아를 지켜낼 새로운 질서가 우리 손에 의해 확립되었음을 알리는 역사적 순간이다.\n\n이제 아시아의 태양은 도쿄가 아닌 서울에서 떠오를 것이며, 황제의 칙령이 동방의 모든 바다와 땅을 다스리게 될 것이다. 우리가 곧 아시아의 질서이자 법이다!"
 dhe_event.2.a:0 "동방의 절대 패자(覇者)여, 영원하라!"

 dhe_event.3.t:0 "광무개혁(光武改革): 구본신참의 기치 아래"
 dhe_event.3.d:0 "제국을 선포했으나 내실이 없다면 그것은 모래 위에 지은 성(砂上樓閣)과 다를 바 없다. 서세동점(西勢東漸)의 거센 파도 속에서 살아남기 위해서는 뼈를 깎는 개혁이 필요하다.\n\n'옛것을 근본으로 삼고 새것을 참고한다'는 구본신참(舊本新參)의 원칙 아래, 우리는 산업, 군사, 교육, 행정, 사회 전반에 걸친 대대적인 개혁을 단행할 것이다.\n\n이제 낡은 인습을 타파하고 부국강병의 기틀을 마련하여, 세계 만국과 당당히 경쟁하는 근대 제국으로 거듭나야 한다."
 dhe_event.3.a:0 "개혁 없이는 미래도 없다! 전진하라!"

 dhe_event.4.t:0 "광무개혁 완수: 근대 제국의 완성"
 dhe_event.4.d:0 "피와 땀으로 얼룩진 고난의 시간이 지났다. 우리의 끊임없는 노력은 결코 헛되지 않았다.\n\n전국 방방곡곡에 철마가 달리고, 최신식 무기로 무장한 황군이 국경을 철통같이 지키며, 신식 학교에서 배운 깨어있는 백성들이 제국의 미래를 밝히고 있다.\n\n우리는 이제 그 누구도 무시할 수 없는 명실상부한 열강의 반열에 올랐다.\n\n오늘 우리는 전 세계에 선언한다. 대한제국은 영원할 것이며, 우리의 번영은 끝이 없을 것이다!"
 dhe_event.4.a:0 "제국의 영광은 영원하리라!"
 
 dhe_event.hangeul_complete.t:0 "한글의 보급"
 dhe_event.hangeul_complete.d:0 "체계적인 교육 덕분에 백성들이 글을 깨우치고 있습니다. 국력이 크게 신장될 것입니다."
 dhe_event.hangeul_complete.a:0 "훌륭하구나."

 dhe_event_1_tt: "대한제국 선포 보상"
 dhe_event_1_desc_tt: "만주족이 §Y수용 문화(주 문화)§!로 편입되며, 막대한 제국 위신을 얻고 곧이어 §Y광무개혁§!이 시작됩니다."
 
 dhe_event_2_tt: "대통합 달성 보상"
 dhe_event_2_desc_tt: "만주 및 일본 전역이 §Y한국인 본토(Homeland)§!로 편입되며, 전체 인구의 20%가 충성파로 전환되고 강력한 통합 버프를 얻습니다."
 
 dhe_event_3_tt: "광무개혁 일지 활성화"
 dhe_event_3_desc_tt: "국정 전반에 걸친 §Y6개의 광무개혁 미션(일지)§!이 새롭게 시작됩니다."
 
 dhe_event_4_tt: "광무개혁 최종 보상"
 dhe_event_4_desc_tt: "광무개혁의 모든 미션을 달성한 보상으로 국가 전반에 압도적인 §Y영구 모디파이어§!가 적용됩니다."
 
 dhe_event_5_tt: "한글 보급 완료 보상"
 dhe_event_5_desc_tt: "문맹 퇴치의 훌륭한 성과로 전체 인구의 10%가 새롭게 §Y충성파§!로 전환됩니다."
 
 dhe_gyeongbokgung_tt: "경복궁 중건 잠금 해제"
 dhe_gyeongbokgung_desc_tt: "이제 한성(서울)의 건설 탭에서 직접 §Y경복궁§!을 건설할 수 있게 됩니다."
 
 dhe_university_1_tt: "제국대학 미션 활성화"
 dhe_university_1_desc_tt: "일지 탭에 §Y서울대학교(제국대학) 설립§! 미션이 새롭게 추가됩니다."
 
 dhe_university_2_tt: "서울대학교 설립 보상"
 dhe_university_2_desc_tt: "한성(서울) 지역에 강력한 §Y국립 대학 효율 버프§!가 영구적으로 적용되며, 5만 명의 충성파를 즉시 얻습니다."

 # 이벤트 텍스트
 dhe_military_event.1.t: "기초 군제 개혁 완료"
 dhe_military_event.1.d: "우리의 군대가 마침내 구식 무기를 버리고 근대적인 전열보병과 대포로 무장했습니다! 군의 뼈대가 세워졌으니, 이제 황제 폐하의 권위를 세우고 열강의 침탈을 막아낼 '진정한 대제국군'으로 거듭날 때입니다."
 dhe_military_event.1.f: "원수부를 창설하여 군 통수권을 확립하라!"
 dhe_military_event.1.a: "강력한 자주국방을 위하여!"
 
 dhe_military_event_1_tt: "심화 군사 개혁 시작"
 dhe_military_event_1_desc_tt: "일지 탭에 §Y[제국 국방의 완성]§! 심화 미션이 새롭게 추가됩니다."

 # 한글 교육 결정

 dhe_hangeul_edu_prepare_decision:0 "한글 교육 준비"
 dhe_hangeul_edu_prepare_decision_desc:0 "황제 폐하의 칙령 아래, 백성 모두가 글을 깨칠 수 있도록 국가 차원의 한글 교육 체계를 준비한다."
 dhe_hangeul_edu_prepare_decision_tooltip:0 "20년간 한글 교육 준비 정책을 시행합니다."
 dhe_hangeul_edu_preparing:0 "한글 교육 준비."
 dhe_hangeul_edu_complete_decision:0 "한글 교육 완수"
 dhe_hangeul_edu_complete_decision_desc:0 "한글 교육 체계가 전국에 정착되었습니다. 문자는 더 이상 지식인의 전유물이 아닙니다."
 dhe_hangeul_edu_complete_decision_tooltip:0 "한글 교육이 완전히 제도화되어 영구적인 효과를 얻습니다."
 dhe_hangeul_edu_completed:0 "한글 교육 완료."
 

