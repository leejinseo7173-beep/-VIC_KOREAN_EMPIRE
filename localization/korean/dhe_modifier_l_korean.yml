 dhe_mod_seoul_national_university: "국립 서울대학교"
 dhe_mod_seoul_national_university_desc: "국가 최고 학부의 존재로 인해 이 지역의 대학교는 타의 추종을 불허하는 엄청난 연구 성과와 엘리트 인재를 배출해 냅니다."