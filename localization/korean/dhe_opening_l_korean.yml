l_korean:
# 폭풍 전야 일지
 je_dhe_hermit_kingdom:0 "조용한 은자의 나라"
 je_dhe_hermit_kingdom_reason:0 "조선은 수백 년간 외부의 거친 파도를 피하며 평화로운 고립을 유지해왔습니다. 겉보기엔 그 어느 때보다 고요하지만, 무언가 불길한 폭풍이 다가오고 있습니다..."
 dhe_hermit_timer_tt:0 "1836년 2월 1일이 되면 기나긴 평화가 깨집니다."
 # 1. 모디파이어 (디버프)
 modifier_sedo_politics:0 "세도정치 (勢道政治)"
 modifier_sedo_politics_desc:0 "소수의 외척 가문이 국가의 모든 권력을 독점하고 있습니다. 왕권은 허수아비로 전락했고, 매관매직이 판을 치며, 썩어빠진 조정은 세상이 바뀌는 것도 모른 채 권력 투쟁에만 몰두하고 있습니다."
 
 modifier_samjeong_corruption:0 "삼정의 문란 (三政紊亂)"
 modifier_samjeong_corruption_desc:0 "전정, 군정, 환곡이라는 국가의 세 가지 근본 제도가 탐관오리들의 극심한 수탈로 인해 완전히 붕괴되었습니다. 백성들의 피눈물이 강을 이루고 있으며, 전국 각지에서 횃불을 든 농민들의 분노가 끓어오르고 있습니다."

 # 2. 메인 및 세부 일지
 je_dhe_save_joseon:0 "도탄에 빠진 왕조"
 je_dhe_save_joseon_reason:0 "조선을 갉아먹는 세도정치와 삼정의 문란을 모두 타파해야만 새로운 시대로 나아갈 수 있습니다."
 
 je_dhe_sedo_politics_reform:0 "세도정치 타파"
 je_dhe_sedo_politics_reform_reason:0 "조정을 장악한 외척과 지주(양반) 세력의 정치력을 20% 이하로 끌어내려 왕권을 되찾아야 합니다."

 je_dhe_samjeong_reform:0 "삼정의 문란 개혁"
 je_dhe_samjeong_reform_reason:0 "전통주의와 토지 기반 조세법을 폐지하여 썩어빠진 조세 제도를 뜯어고치고, 행정력 적자를 해소해야 합니다."

 # 3. 이벤트 텍스트
 dhe_opening.1.t:0 "망국의 전조: 세도와 문란"
 dhe_opening.1.d:0 "전하, 조선의 산천이 피눈물을 흘리고 있습니다! 안동 김씨를 비롯한 외척 가문들이 조정을 장악하여 왕권을 철저히 능멸하고 있으며, 지방의 탐관오리들은 삼정의 문란을 빌미로 백성들의 마지막 고혈까지 쥐어짜고 있습니다. 이대로라면 이 나라는 안에서부터 썩어문드러져 머지않아 무너지고 말 것입니다!"
 dhe_opening.1.f:0 "민심은 극도로 흉흉하며, 도처에서 농민들이 횃불을 들고 일어날 것이라는 소문이 돌고 있다."
 dhe_opening.1.a:0 "과인이 직접 이 썩어빠진 적폐들을 도려내겠노라!"

 dhe_opening.2.t:0 "여명의 아침"
 dhe_opening.2.d:0 "기나긴 어둠이 걷히고 마침내 새로운 아침이 밝았습니다! 국정을 농단하던 외척 세력은 권좌에서 쫓겨나 처벌받았고, 백성들의 피를 빨아먹던 악법들은 모두 혁파되었습니다. 비로소 국가의 기틀이 바로잡혔으니, 이제 조선은 낡은 허물을 벗고 스스로의 운명을 웅대하게 개척할 준비가 되었습니다."
 dhe_opening.2.f:0 "새로운 시대의 거센 바람이 반도에 불어오고 있다."
 dhe_opening.2.a:0 "이제, 우리는 제국(帝國)으로 나아갈 것이다."